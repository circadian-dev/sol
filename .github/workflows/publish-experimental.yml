name: Publish Experimental

on:
  pull_request:
    branches:
      - main

jobs:
  publish:
    name: Publish Preview
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.16

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish Preview
        run: bunx pkg-pr-new publish .